name: Deploy WebMapApp frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'WebMapApp/frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: WebMapApp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: WebMapApp/frontend
        run: npm ci

      - name: Build
        working-directory: WebMapApp/frontend
        env:
          VITE_BASE: /GeoAI/
        run: npm run build

      - name: Add SPA fallback for client-side routes
        working-directory: WebMapApp/frontend
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: WebMapApp/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
